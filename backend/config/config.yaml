keywords:
  - hello

phrases:
  - did you understand
  - did y'll understand


audio:
  # The index of the microphone to use. None means default.
  device_index: null
  # Sample rate required by Silero VAD (16000 is standard)
  sample_rate: 16000
  # Chunk size in seconds
  chunk_duration: 0.5
  
vad:
  # Sensitivity threshold for Silero VAD (0.0 to 1.0)
  threshold: 0.5
  
transcription:
  # Whisper model (tiny, base, small, medium, large-v3, distil-large-v3)
  model: distil-large-v3
  # Language to force for transcription (e.g., 'en'), or null for auto-detect
  language: en
  
output:
  # Console refresh rate in seconds
  refresh_rate: 1.0
  # Optionally save counts to this JSON file
  save_path: counts.json
